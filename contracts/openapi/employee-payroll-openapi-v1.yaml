parameters:
  CorrelationId:
    name: X-Correlation-ID
    in: header
    required: false
    schema: {type: string, format: uuid}
  IdentityId:
    name: identityId
    in: path
    required: true
    schema: {type: string, format: uuid}
  VersionId:
    name: versionId
    in: path
    required: true
    schema: {type: string, format: uuid}
  AssignmentId:
    name: assignmentId
    in: path
    required: true
    schema: {type: string, format: uuid}
  ProfileId:
    name: profileId
    in: path
    required: true
    schema: {type: string, format: uuid}
  RelationshipId:
    name: relationshipId
    in: path
    required: true
    schema: {type: string, format: uuid}
  IdempotencyKey:
    name: Idempotency-Key
    in: header
    required: true
    schema: {type: string, minLength: 8, maxLength: 120}
  IfMatch:
    name: If-Match
    in: header
    required: true
    description: Numeric version ETag used for optimistic concurrency.
    schema: {type: string, pattern: '^(W/)?"?[0-9]+"?$'}
  AsOf:
    name: asOf
    in: query
    required: false
    schema: {type: string, format: date}
  PayrollRelationshipIdQuery:
    name: payrollRelationshipId
    in: query
    required: true
    schema: {type: string, format: uuid}
  PayrollAssignmentVersionIdQuery:
    name: payrollAssignmentVersionId
    in: query
    required: true
    schema: {type: string, format: uuid}

responses:
  Problem:
    description: Request rejected
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}
  Unauthorized:
    description: Authentication is required or invalid
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}
  Forbidden:
    description: The caller lacks the required permission
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}
  NotFound:
    description: Resource not found in the current tenant
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}
  Conflict:
    description: Lifecycle, idempotency or optimistic-concurrency conflict
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}
  UnprocessableEntity:
    description: Validation or business-rule failure
    content:
      application/problem+json:
        schema: {$ref: '#/schemas/Problem'}

pathItems:
  PayrollRelationshipCollection:
    parameters:
    - $ref: '#/parameters/CorrelationId'
    get:
      tags: [Employee Payroll]
      summary: List approved payroll relationships effective on a date
      operationId: listPayrollRelationships
      x-permission: employee-payroll.relationship.read
      parameters:
      - $ref: '#/parameters/AsOf'
      responses:
        '200':
          description: Effective payroll relationships
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/schemas/PayrollRelationship'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
    post:
      tags: [Employee Payroll]
      summary: Create a payroll relationship identity and first draft version
      operationId: createPayrollRelationship
      x-permission: employee-payroll.relationship.create
      parameters:
      - $ref: '#/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/schemas/PayrollRelationshipWrite'}
      responses:
        '201':
          description: Payroll relationship created
          headers:
            ETag: {schema: {type: string}}
          content:
            application/json:
              schema: {$ref: '#/schemas/PayrollRelationship'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '409': {$ref: '#/responses/Conflict'}
        '422': {$ref: '#/responses/UnprocessableEntity'}
  PayrollRelationshipIdentity:
    parameters:
    - $ref: '#/parameters/IdentityId'
    - $ref: '#/parameters/CorrelationId'
    get:
      tags: [Employee Payroll]
      summary: Get the current or as-of approved relationship version
      operationId: getPayrollRelationship
      x-permission: employee-payroll.relationship.read
      parameters:
      - $ref: '#/parameters/AsOf'
      responses:
        '200':
          description: Effective payroll relationship
          headers:
            ETag: {schema: {type: string}}
          content:
            application/json:
              schema: {$ref: '#/schemas/PayrollRelationship'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '404': {$ref: '#/responses/NotFound'}
  PayrollRelationshipVersions:
    parameters:
    - $ref: '#/parameters/IdentityId'
    - $ref: '#/parameters/CorrelationId'
    get:
      tags: [Employee Payroll]
      summary: Read payroll relationship version history
