          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/schemas/PayrollRelationship'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
    post:
      tags: [Employee Payroll]
      summary: Append a payroll relationship version
      operationId: createPayrollRelationshipVersion
      x-permission: employee-payroll.relationship.version.create
      parameters:
      - $ref: '#/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/schemas/PayrollRelationshipWrite'}
      responses:
        '201':
          description: Version created
          content:
            application/json:
              schema: {$ref: '#/schemas/PayrollRelationship'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '404': {$ref: '#/responses/NotFound'}
        '409': {$ref: '#/responses/Conflict'}
        '422': {$ref: '#/responses/UnprocessableEntity'}
  PayrollRelationshipCorrection:
    parameters:
