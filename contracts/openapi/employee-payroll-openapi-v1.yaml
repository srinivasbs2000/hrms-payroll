      - $ref: '#/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/schemas/SalaryAssignmentWrite'}
      responses:
        '201':
          description: Salary assignment created
          content:
            application/json:
              schema: {$ref: '#/schemas/SalaryAssignment'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '409': {$ref: '#/responses/Conflict'}
        '422': {$ref: '#/responses/UnprocessableEntity'}
  SalaryAssignmentCorrection:
    parameters:
    - $ref: '#/parameters/AssignmentId'
    - $ref: '#/parameters/CorrelationId'
    post:
      tags: [Employee Payroll]
      summary: Supersede an eligible future salary assignment draft
      operationId: correctSalaryAssignment
      x-permission: employee-payroll.salary-assignment.correct
      parameters:
      - $ref: '#/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/schemas/SalaryAssignmentWrite'}
      responses:
        '200':
          description: Corrected salary assignment
          content:
            application/json:
              schema: {$ref: '#/schemas/SalaryAssignment'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '404': {$ref: '#/responses/NotFound'}
        '409': {$ref: '#/responses/Conflict'}
        '422': {$ref: '#/responses/UnprocessableEntity'}
  SalaryAssignmentApproval:
    parameters:
    - $ref: '#/parameters/AssignmentId'
    - $ref: '#/parameters/CorrelationId'
    post:
      tags: [Employee Payroll]
      summary: Approve a salary assignment draft
      operationId: approveSalaryAssignment
      x-permission: employee-payroll.salary-assignment.approve
      parameters:
      - $ref: '#/parameters/IdempotencyKey'
      responses:
        '200':
          description: Approved salary assignment
          content:
            application/json:
              schema: {$ref: '#/schemas/SalaryAssignment'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '404': {$ref: '#/responses/NotFound'}
        '409': {$ref: '#/responses/Conflict'}
  SalaryAssignmentEndDate:
    parameters:
    - $ref: '#/parameters/AssignmentId'
    - $ref: '#/parameters/CorrelationId'
    post:
      tags: [Employee Payroll]
      summary: End-date a salary assignment
      operationId: endDateSalaryAssignment
      x-permission: employee-payroll.salary-assignment.end-date
      parameters:
      - $ref: '#/parameters/IdempotencyKey'
      - $ref: '#/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/schemas/EffectiveEndDate'}
      responses:
        '200':
          description: End-dated salary assignment
          content:
            application/json:
              schema: {$ref: '#/schemas/SalaryAssignment'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}
        '404': {$ref: '#/responses/NotFound'}
        '409': {$ref: '#/responses/Conflict'}
        '422': {$ref: '#/responses/UnprocessableEntity'}
  SalaryAssignmentAudit:
    parameters:
    - $ref: '#/parameters/AssignmentId'
    - $ref: '#/parameters/CorrelationId'
    get:
      tags: [Employee Payroll]
      summary: Read salary assignment audit history
      operationId: listSalaryAssignmentAudit
      x-permission: audit.read
      responses:
        '200':
          description: Audit history
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/schemas/AuditEvent'}
        '401': {$ref: '#/responses/Unauthorized'}
        '403': {$ref: '#/responses/Forbidden'}

schemas:
  Problem:
    type: object
    properties:
      type: {type: string, format: uri}
      title: {type: string}
      status: {type: integer}
      detail: {type: string}
      instance: {type: string, format: uri-reference}
  AuditEvent:
    type: object
    additionalProperties: false
    required:
    - id
    - occurredAt
    - actor
    - action
    - objectType
    - objectId
    - correlationId
    properties:
      id: {type: string, format: uuid}
      occurredAt: {type: string, format: date-time}
      actor: {type: string}
      action: {type: string}
      objectType: {type: string}
      objectId: {type: string, format: uuid}
      correlationId: {type: string, format: uuid}
      beforeState: {type: [string, 'null']}
      afterState: {type: [string, 'null']}
      metadata: {type: [string, 'null']}
  PayrollRelationshipWrite:
    type: object
    additionalProperties: false
    required: [legalEntityVersionId, relationshipStart]
    properties:
      externalEmployeeId:
        type: [string, 'null']
        maxLength: 100
        description: Required when creating the stable relationship identity.
      employeeNumber:
        type: [string, 'null']
        maxLength: 60
        description: Required when creating the stable relationship identity.
      legalEntityVersionId: {type: string, format: uuid}
      relationshipStart: {type: string, format: date}
      relationshipEnd: {type: [string, 'null'], format: date}
  PayrollRelationshipEndDate:
    type: object
    additionalProperties: false
    required: [relationshipEnd]
    properties:
      relationshipEnd: {type: string, format: date}
  PayrollRelationship:
    type: object
    additionalProperties: false
    required:
    - identityId
    - externalEmployeeId
    - employeeNumber
    - identityStatus
    - versionId
    - versionSequence
    - versionNo
    - legalEntityVersionId
    - relationshipStart
    - approvalStatus
    - superseded
    properties:
      identityId: {type: string, format: uuid}
      externalEmployeeId: {type: string}
      employeeNumber: {type: string}
      identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
      versionId: {type: string, format: uuid}
      versionSequence: {type: integer, minimum: 1}
      versionNo: {type: integer, format: int64, minimum: 0}
      legalEntityVersionId: {type: string, format: uuid}
      relationshipStart: {type: string, format: date}
      relationshipEnd: {type: [string, 'null'], format: date}
      approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
      supersedesVersionId: {type: [string, 'null'], format: uuid}
      superseded: {type: boolean}
  PayrollAssignmentWrite:
    type: object
    additionalProperties: false
    required:
    - payrollRelationshipVersionId
    - establishmentVersionId
    - assignmentStart
    properties:
      payrollRelationshipId:
        type: [string, 'null']
        format: uuid
        description: Required when creating the stable assignment identity.
      assignmentNumber:
        type: [string, 'null']
        maxLength: 60
        description: Required when creating the stable assignment identity.
      payrollRelationshipVersionId: {type: string, format: uuid}
      establishmentVersionId: {type: string, format: uuid}
      assignmentStart: {type: string, format: date}
      assignmentEnd: {type: [string, 'null'], format: date}
  PayrollAssignmentEndDate:
    type: object
    additionalProperties: false
    required: [assignmentEnd]
    properties:
      assignmentEnd: {type: string, format: date}
  PayrollAssignment:
    type: object
    additionalProperties: false
    required:
    - identityId
    - payrollRelationshipId
    - assignmentNumber
    - identityStatus
    - versionId
    - versionSequence
    - versionNo
    - payrollRelationshipVersionId
    - establishmentVersionId
    - assignmentStart
    - approvalStatus
    - superseded
    properties:
      identityId: {type: string, format: uuid}
      payrollRelationshipId: {type: string, format: uuid}
      assignmentNumber: {type: string}
      identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
      versionId: {type: string, format: uuid}
      versionSequence: {type: integer, minimum: 1}
      versionNo: {type: integer, format: int64, minimum: 0}
      payrollRelationshipVersionId: {type: string, format: uuid}
      establishmentVersionId: {type: string, format: uuid}
      assignmentStart: {type: string, format: date}
      assignmentEnd: {type: [string, 'null'], format: date}
      approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
      supersedesVersionId: {type: [string, 'null'], format: uuid}
      superseded: {type: boolean}
  EmployeePayrollProfileWrite:
    type: object
    additionalProperties: false
    required: [payrollRelationshipId]
    properties:
      payrollRelationshipId: {type: string, format: uuid}
      currency: {type: [string, 'null'], const: INR, default: INR}
  EmployeePayrollProfileStatusWrite:
    type: object
    additionalProperties: false
    required: [payrollStatus]
    properties:
      payrollStatus:
        type: string
        enum: [INCOMPLETE, READY, ON_HOLD, INACTIVE]
  EmployeePayrollProfile:
    type: object
    additionalProperties: false
    required:
    - id
    - payrollRelationshipId
    - employeeNumber
    - currency
    - payrollStatus
    - versionNo
    properties:
      id: {type: string, format: uuid}
      payrollRelationshipId: {type: string, format: uuid}
      employeeNumber: {type: string}
      currency: {type: string, const: INR}
      payrollStatus:
        type: string
        enum: [INCOMPLETE, READY, ON_HOLD, INACTIVE]
      versionNo: {type: integer, format: int64, minimum: 0}
  PayGroupAssignmentWrite:
    type: object
    additionalProperties: false
    required:
    - payrollAssignmentVersionId
    - payGroupVersionId
    - effectiveFrom
    properties:
      payrollAssignmentVersionId: {type: string, format: uuid}
      payGroupVersionId: {type: string, format: uuid}
      effectiveFrom: {type: string, format: date}
      effectiveTo: {type: [string, 'null'], format: date}
  EffectiveEndDate:
    type: object
    additionalProperties: false
    required: [effectiveTo]
    properties:
      effectiveTo: {type: string, format: date}
  PayGroupAssignment:
    type: object
    additionalProperties: false
    required:
    - id
    - payrollAssignmentVersionId
    - payGroupVersionId
    - effectiveFrom
    - approvalStatus
    - superseded
    - versionNo
    properties:
      id: {type: string, format: uuid}
      payrollAssignmentVersionId: {type: string, format: uuid}
      payGroupVersionId: {type: string, format: uuid}
      effectiveFrom: {type: string, format: date}
      effectiveTo: {type: [string, 'null'], format: date}
      approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
      supersedesAssignmentId: {type: [string, 'null'], format: uuid}
      superseded: {type: boolean}
      versionNo: {type: integer, format: int64, minimum: 0}
  SalaryAssignmentWrite:
    type: object
    additionalProperties: false
    required:
    - payrollAssignmentVersionId
    - salaryStructureVersionId
    - monthlyAmount
    - effectiveFrom
    properties:
      payrollAssignmentVersionId: {type: string, format: uuid}
      salaryStructureVersionId: {type: string, format: uuid}
      monthlyAmount: {type: number, minimum: 0, multipleOf: 0.0001}
      currency: {type: [string, 'null'], const: INR, default: INR}
      effectiveFrom: {type: string, format: date}
      effectiveTo: {type: [string, 'null'], format: date}
  SalaryAssignment:
    type: object
    additionalProperties: false
    required:
    - id
    - payrollAssignmentVersionId
    - salaryStructureVersionId
    - monthlyAmount
    - currency
    - effectiveFrom
    - approvalStatus
    - superseded
    - versionNo
    properties:
      id: {type: string, format: uuid}
      payrollAssignmentVersionId: {type: string, format: uuid}
      salaryStructureVersionId: {type: string, format: uuid}
      monthlyAmount: {type: number, minimum: 0, multipleOf: 0.0001}
      currency: {type: string, const: INR}
      effectiveFrom: {type: string, format: date}
      effectiveTo: {type: [string, 'null'], format: date}
      approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
      supersedesAssignmentId: {type: [string, 'null'], format: uuid}
      superseded: {type: boolean}
      versionNo: {type: integer, format: int64, minimum: 0}
