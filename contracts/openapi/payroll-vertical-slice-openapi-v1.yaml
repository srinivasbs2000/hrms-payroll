openapi: 3.1.0
info:
  title: HRMS Payroll Vertical Slice API
  version: 1.0.0
  description: Organisation-to-draft-payslip implementation contract. Statutory, tax,
    banking, accounting, retro and final settlement are outside this contract.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: /api/v1
security:
- oidc: []
tags:
- name: Organisation
  description: Employer hierarchy and establishment setup.
- name: Calendar
  description: Monthly calendars, periods and pay groups.
- name: Compensation
  description: Pay components and salary structures.
- name: Employee Payroll
  description: Payroll relationships, assignments and salary assignment.
- name: Payroll Operations
  description: Regular cycle, population and sealed inputs.
- name: Calculation
  description: Deterministic gross-to-net results and trace.
- name: Documents
  description: Draft payslip generation and retrieval.
paths:
  /legal-entities:
    $ref: '#/components/pathItems/OrganisationCollection'
  /payroll-statutory-units:
    $ref: '#/components/pathItems/OrganisationCollection'
  /establishments:
    $ref: '#/components/pathItems/OrganisationCollection'
  /legal-entities/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /payroll-statutory-units/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /establishments/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /legal-entities/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /payroll-statutory-units/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /establishments/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /legal-entities/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /payroll-statutory-units/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /establishments/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /legal-entities/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /payroll-statutory-units/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /establishments/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /legal-entities/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /payroll-statutory-units/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /establishments/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /legal-entities/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /payroll-statutory-units/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /establishments/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /organisation-hierarchy:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    - $ref: '#/components/parameters/AsOf'
    get:
      tags: [Organisation]
      summary: Read the effective organisation hierarchy
      operationId: getOrganisationHierarchy
      x-permission: organisation.read
      responses:
        '200':
          description: Legal entity, payroll statutory unit and establishment hierarchy
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationHierarchy'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
  /payroll-calendars:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Calendar
      operationId: createPayrollCalendar
      x-permission: calendar.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollCalendarCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Payroll Calendar
  /payroll-calendars/{calendarId}/periods:
    parameters:
    - $ref: '#/components/parameters/CalendarId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Calendar
      operationId: generatePayPeriods
      x-permission: calendar.period.generate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePeriodsRequest'
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayPeriod'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Generate Pay Periods
    get:
      tags:
      - Calendar
      operationId: listPayPeriods
      x-permission: calendar.read
      responses:
        '200':
          description: Periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayPeriod'
        '400':
          $ref: '#/components/responses/Problem'
      summary: List Pay Periods
  /pay-groups:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Calendar
      operationId: createPayGroup
      x-permission: pay-group.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayGroupCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Pay Group
  /pay-components:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Compensation
      operationId: createPayComponent
      x-permission: compensation.component.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayComponentCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Pay Component
  /salary-structures:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Compensation
      operationId: createSalaryStructure
      x-permission: compensation.structure.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalaryStructureCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Salary Structure
  /payroll-relationships:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Employee Payroll
      operationId: createPayrollRelationship
      x-permission: employee-payroll.relationship.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollRelationshipCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Payroll Relationship
  /payroll-assignments/{assignmentId}/salary-assignments:
    parameters:
    - $ref: '#/components/parameters/AssignmentId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Employee Payroll
      operationId: assignSalary
      x-permission: employee-payroll.salary.assign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalaryAssignmentCreate'
      responses:
        '201':
          description: Assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Assign Salary
  /payroll-cycles:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Payroll Operations
      operationId: createPayrollCycle
      x-permission: payroll-cycle.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollCycleCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityId'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Create Payroll Cycle
  /payroll-cycles/{cycleId}/resolve-population:
    parameters:
    - $ref: '#/components/parameters/CycleId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Payroll Operations
      operationId: resolvePopulation
      x-permission: payroll-cycle.population.resolve
      responses:
        '200':
          description: Population
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopulationSummary'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Resolve Population
  /payroll-cycles/{cycleId}/seal-inputs:
    parameters:
    - $ref: '#/components/parameters/CycleId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Payroll Operations
      operationId: sealInputs
      x-permission: payroll-cycle.inputs.seal
      responses:
        '200':
          description: Sealed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotSummary'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Seal Inputs
  /payroll-calculations:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Calculation
      operationId: calculatePayroll
      x-permission: payroll-calculation.execute
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationAccepted'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      summary: Calculate Payroll
  /payroll-results/{resultId}:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    get:
      tags:
      - Calculation
      operationId: getPayrollResult
      x-permission: payroll-result.read
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollResult'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Payroll Result
  /payroll-results/{resultId}/trace:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    get:
      tags:
      - Calculation
      operationId: getCalculationTrace
      x-permission: payroll-result.trace.read
      responses:
        '200':
          description: Trace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TraceStep'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Calculation Trace
  /payroll-results/{resultId}/draft-payslip:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Documents
      operationId: generateDraftPayslip
      x-permission: draft-payslip.generate
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPayslip'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Generate Draft Payslip
    get:
      tags:
      - Documents
      operationId: getDraftPayslip
      x-permission: draft-payslip.read
      responses:
        '200':
          description: Draft payslip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPayslip'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Draft Payslip
components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: http://localhost:8081/realms/payroll/.well-known/openid-configuration
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      description: Caller-supplied UUID used for request, log, event and error correlation. A value is generated when omitted or invalid.
      schema:
        type: string
        format: uuid
    CalendarId:
      name: calendarId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CycleId:
      name: cycleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResultId:
      name: resultId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 120
    IdentityId:
      name: identityId
      in: path
      required: true
      schema: {type: string, format: uuid}
    VersionId:
      name: versionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    AsOf:
      name: asOf
      in: query
      required: false
      description: Effective date; defaults to the application clock date.
      schema: {type: string, format: date}
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Numeric version ETag used for optimistic concurrency.
      schema: {type: string, pattern: '^(W/)?"?[0-9]+"?$'}
  pathItems:
    OrganisationCollection:
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: listOrganisationIdentities
        tags: [Organisation]
        summary: List effective organisation identities
        x-permission: organisation.read
        parameters:
        - $ref: '#/components/parameters/AsOf'
        responses:
          '200':
            description: Effective organisation identities
            headers:
              X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
            content:
              application/json:
                schema: {type: array, items: {$ref: '#/components/schemas/OrganisationVersion'}}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
      post:
        operationId: createOrganisationIdentity
        tags: [Organisation]
        summary: Create a stable identity and first draft version
        x-permission: organisation.create
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '201': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
    OrganisationIdentity:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: getOrganisationIdentity
        tags: [Organisation]
        summary: Get the current or as-of approved version
        x-permission: organisation.read
        parameters:
        - $ref: '#/components/parameters/AsOf'
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
    OrganisationVersions:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: listOrganisationVersions
        tags: [Organisation]
        summary: Read complete version history
        x-permission: organisation.read
        responses:
          '200':
            description: Ordered version history, including superseded drafts
            headers:
              X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
            content:
              application/json:
                schema: {type: array, items: {$ref: '#/components/schemas/OrganisationVersion'}}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
      post:
        operationId: createOrganisationVersion
        tags: [Organisation]
        summary: Append a future effective-dated version
        x-permission: organisation.version.create
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '201': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
    OrganisationCorrection:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/CorrelationId'
      post:
        operationId: correctOrganisationVersion
        tags: [Organisation]
        summary: Supersede an eligible future draft without rewriting it
        x-permission: organisation.version.correct
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
    OrganisationEndDate:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/CorrelationId'
      post:
        operationId: endDateOrganisationVersion
        tags: [Organisation]
        summary: End-date an active version through the controlled lifecycle command
        x-permission: organisation.version.end-date
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        requestBody:
          required: true
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OrganisationEndDate'}
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
    OrganisationApproval:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/CorrelationId'
      post:
        operationId: approveOrganisationVersion
        tags: [Organisation]
        summary: Approve a non-superseded draft version
        x-permission: organisation.approve
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
    OrganisationAudit:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: listOrganisationAuditEvents
        tags: [Organisation]
        summary: Read immutable audit evidence for an organisation identity
        x-permission: audit.read
        responses:
          '200':
            description: Audit event history
            headers:
              X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
            content:
              application/json:
                schema: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
  requestBodies:
    OrganisationWriteRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrganisationWrite'
  responses:
    Unauthorized:
      description: Authentication is missing or invalid
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Forbidden:
      description: The authenticated principal lacks the required permission
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    NotFound:
      description: The tenant-visible resource was not found
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Conflict:
      description: Idempotency, optimistic concurrency or effective-date conflict
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    UnprocessableEntity:
      description: The request is syntactically valid but violates domain validation
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    TooManyRequests:
      description: Request rate limit exceeded
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    InternalServerError:
      description: Unexpected application failure
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    ServiceUnavailable:
      description: A required dependency is unavailable
      headers: {X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}}
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    OrganisationVersion:
      description: Organisation identity and exact effective-dated version
      headers:
        X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
        ETag:
          description: Numeric optimistic-concurrency version
          schema: {type: string}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/OrganisationVersion'}
    Problem:
      description: Problem Details
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  headers:
    CorrelationId:
      description: UUID shared by request logs, domain events and RFC 9457 error responses.
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    OrganisationWrite:
      type: object
      additionalProperties: false
      required: [name, effectiveFrom]
      properties:
        code:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
          description: Required only when creating a stable identity.
        name: {type: string, minLength: 1, maxLength: 200}
        countryCode: {type: [string, 'null'], pattern: '^[A-Z]{2}$'}
        currency: {type: [string, 'null'], pattern: '^[A-Z]{3}$'}
        stateCode: {type: [string, 'null'], pattern: '^[A-Z0-9]{2,3}$'}
        parentVersionId:
          type: [string, 'null']
          format: uuid
          description: Exact legal-entity version for a PSU or exact PSU version for an establishment.
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
    OrganisationEndDate:
      type: object
      additionalProperties: false
      required: [effectiveTo]
      properties:
        effectiveTo: {type: string, format: date}
    OrganisationVersion:
      type: object
      additionalProperties: false
      required: [kind, identityId, code, identityStatus, versionId, versionSequence, versionNo,
        name, effectiveFrom, approvalStatus, superseded]
      properties:
        kind: {type: string, enum: [LEGAL_ENTITY, PAYROLL_STATUTORY_UNIT, ESTABLISHMENT]}
        identityId: {type: string, format: uuid}
        code: {type: string}
        identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
        versionId: {type: string, format: uuid}
        versionSequence: {type: integer, minimum: 1}
        versionNo: {type: integer, format: int64, minimum: 0}
        name: {type: string}
        countryCode: {type: [string, 'null']}
        currency: {type: [string, 'null']}
        stateCode: {type: [string, 'null']}
        parentVersionId: {type: [string, 'null'], format: uuid}
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
        supersedesVersionId: {type: [string, 'null'], format: uuid}
        superseded: {type: boolean}
    OrganisationHierarchy:
      type: object
      required: [asOf, legalEntities]
      properties:
        asOf: {type: string, format: date}
        legalEntities:
          type: array
          items: {$ref: '#/components/schemas/OrganisationHierarchyNode'}
    OrganisationHierarchyNode:
      type: object
      required: [value, children]
      properties:
        value: {$ref: '#/components/schemas/OrganisationVersion'}
        children:
          type: array
          items: {$ref: '#/components/schemas/OrganisationHierarchyNode'}
    AuditEvent:
      type: object
      required: [id, occurredAt, actor, action, objectType, objectId, correlationId, metadata]
      properties:
        id: {type: string, format: uuid}
        occurredAt: {type: string, format: date-time}
        actor: {type: string}
        action: {type: string}
        objectType: {type: string}
        objectId: {type: string, format: uuid}
        correlationId: {type: string, format: uuid}
        beforeState: {type: [string, 'null']}
        afterState: {type: [string, 'null']}
        metadata: {type: string}
    EntityId:
      type: object
      required:
      - id
      properties:
        id:
          type: string
          format: uuid
    Money:
      type: object
      required:
      - amount
      - currency
      properties:
        amount:
          type: string
          pattern: ^-?[0-9]+(\.[0-9]{1,4})?$
        currency:
          type: string
          pattern: ^[A-Z]{3}$
    PayrollCalendarCreate:
      type: object
      required:
      - code
      - name
      - timezone
      properties:
        code:
          type: string
        name:
          type: string
        frequency:
          type: string
          const: MONTHLY
        timezone:
          type: string
          default: Asia/Kolkata
    GeneratePeriodsRequest:
      type: object
      required:
      - year
      properties:
        year:
          type: integer
          minimum: 2020
          maximum: 2100
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
    PayPeriod:
      type: object
      required:
      - id
      - periodCode
      - periodStart
      - periodEnd
      - paymentDate
      properties:
        id:
          type: string
          format: uuid
        periodCode:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        paymentDate:
          type: string
          format: date
    PayGroupCreate:
      type: object
      required:
      - statutoryUnitId
      - calendarId
      - code
      - name
      - effectiveFrom
      properties:
        statutoryUnitId:
          type: string
          format: uuid
        calendarId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        currency:
          type: string
          default: INR
        prorationMethod:
          type: string
          const: CALENDAR_DAYS
        effectiveFrom:
          type: string
          format: date
    PayComponentCreate:
      type: object
      required:
      - code
      - name
      - componentType
      - effectiveFrom
      - formula
      properties:
        code:
          type: string
        name:
          type: string
        componentType:
          type: string
          enum:
          - EARNING
        effectiveFrom:
          type: string
          format: date
        formula:
          $ref: '#/components/schemas/Formula'
    Formula:
      type: object
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - FIXED
          - PERCENTAGE_OF_COMPONENT
          - RESIDUAL
        fixedAmount:
          type:
          - string
          - 'null'
        percentage:
          type:
          - string
          - 'null'
        baseComponentCode:
          type:
          - string
          - 'null'
    SalaryStructureCreate:
      type: object
      required:
      - code
      - name
      - effectiveFrom
      - lines
      properties:
        code:
          type: string
        name:
          type: string
        currency:
          type: string
          default: INR
        effectiveFrom:
          type: string
          format: date
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SalaryStructureLine'
    SalaryStructureLine:
      type: object
      required:
      - componentCode
      - sequence
      properties:
        componentCode:
          type: string
        sequence:
          type: integer
        fixedAmount:
          type:
          - string
          - 'null'
        percentage:
          type:
          - string
          - 'null'
        baseComponentCode:
          type:
          - string
          - 'null'
    PayrollRelationshipCreate:
      type: object
      required:
      - externalEmployeeId
      - employeeNumber
      - legalEntityId
      - establishmentId
      - assignmentNumber
      - relationshipStart
      properties:
        externalEmployeeId:
          type: string
        employeeNumber:
          type: string
        legalEntityId:
          type: string
          format: uuid
        establishmentId:
          type: string
          format: uuid
        assignmentNumber:
          type: string
        relationshipStart:
          type: string
          format: date
    SalaryAssignmentCreate:
      type: object
      required:
      - salaryStructureId
      - monthlyAmount
      - currency
      - effectiveFrom
      properties:
        salaryStructureId:
          type: string
          format: uuid
        payGroupId:
          type: string
          format: uuid
        monthlyAmount:
          type: string
        currency:
          type: string
          default: INR
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          type:
          - string
          - 'null'
          format: date
    PayrollCycleCreate:
      type: object
      required:
      - payGroupId
      - payPeriodId
      properties:
        payGroupId:
          type: string
          format: uuid
        payPeriodId:
          type: string
          format: uuid
        cycleType:
          type: string
          const: REGULAR
    PopulationSummary:
      type: object
      required:
      - cycleId
      - includedCount
      properties:
        cycleId:
          type: string
          format: uuid
        includedCount:
          type: integer
        excludedCount:
          type: integer
    SnapshotSummary:
      type: object
      required:
      - cycleId
      - snapshotCount
      - combinedHash
      properties:
        cycleId:
          type: string
          format: uuid
        snapshotCount:
          type: integer
        combinedHash:
          type: string
    CalculationRequest:
      type: object
      required:
      - payrollCycleId
      properties:
        payrollCycleId:
          type: string
          format: uuid
        mode:
          type: string
          enum:
          - TRIAL
          default: TRIAL
    CalculationAccepted:
      type: object
      required:
      - calculationRequestId
      - status
      properties:
        calculationRequestId:
          type: string
          format: uuid
        status:
          type: string
          const: ACCEPTED
    ComponentResult:
      type: object
      required:
      - componentCode
      - unproratedAmount
      - prorationFactor
      - calculatedAmount
      properties:
        componentCode:
          type: string
        unproratedAmount:
          $ref: '#/components/schemas/Money'
        prorationFactor:
          type: string
        calculatedAmount:
          $ref: '#/components/schemas/Money'
    PayrollResult:
      type: object
      required:
      - id
      - payrollCycleId
      - payrollAssignmentId
      - gross
      - deductions
      - net
      - components
      - resultHash
      properties:
        id:
          type: string
          format: uuid
        payrollCycleId:
          type: string
          format: uuid
        payrollAssignmentId:
          type: string
          format: uuid
        gross:
          $ref: '#/components/schemas/Money'
        deductions:
          $ref: '#/components/schemas/Money'
        net:
          $ref: '#/components/schemas/Money'
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentResult'
        resultHash:
          type: string
    TraceStep:
      type: object
      required:
      - stepNo
      - stepType
      - inputs
      - output
      properties:
        stepNo:
          type: integer
        componentCode:
          type:
          - string
          - 'null'
        stepType:
          type: string
        inputs:
          type: object
          additionalProperties: true
        expression:
          type:
          - string
          - 'null'
        output:
          type: string
        message:
          type:
          - string
          - 'null'
    DraftPayslip:
      type: object
      required:
      - id
      - payrollResultId
      - status
      - employeeNumber
      - payPeriod
      - earnings
      - gross
      - net
      properties:
        id:
          type: string
          format: uuid
        payrollResultId:
          type: string
          format: uuid
        status:
          type: string
          const: DRAFT
        employeeNumber:
          type: string
        payPeriod:
          type: string
        earnings:
          type: array
          items:
            $ref: '#/components/schemas/ComponentResult'
        gross:
          $ref: '#/components/schemas/Money'
        net:
          $ref: '#/components/schemas/Money'
        disclaimer:
          type: string
    Problem:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - instance
      - correlationId
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        correlationId:
          type: string
          format: uuid
        code:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
