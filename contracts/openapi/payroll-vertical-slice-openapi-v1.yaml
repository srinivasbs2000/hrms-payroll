openapi: 3.1.0
info:
  title: HRMS Payroll Vertical Slice API
  version: 1.0.0
  description: Organisation-to-draft-payslip implementation contract. Statutory, tax,
    banking, accounting, retro and final settlement are outside this contract.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: /api/v1
security:
- oidc: []
tags:
- name: Organisation
  description: Employer hierarchy and establishment setup.
- name: Calendar
  description: Monthly calendars, periods and pay groups.
- name: Compensation
  description: Pay components and salary structures.
- name: Employee Payroll
  description: Payroll relationships, assignments and salary assignment.
- name: Payroll Operations
  description: Regular cycle, population and sealed inputs.
- name: Calculation
  description: Deterministic gross-to-net results and trace.
- name: Documents
  description: Draft payslip generation and retrieval.
paths:
  /legal-entities:
    $ref: '#/components/pathItems/OrganisationCollection'
  /payroll-statutory-units:
    $ref: '#/components/pathItems/OrganisationCollection'
  /establishments:
    $ref: '#/components/pathItems/OrganisationCollection'
  /legal-entities/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /payroll-statutory-units/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /establishments/{identityId}:
    $ref: '#/components/pathItems/OrganisationIdentity'
  /legal-entities/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /payroll-statutory-units/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /establishments/{identityId}/versions:
    $ref: '#/components/pathItems/OrganisationVersions'
  /legal-entities/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /payroll-statutory-units/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /establishments/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/OrganisationCorrection'
  /legal-entities/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /payroll-statutory-units/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /establishments/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/OrganisationEndDate'
  /legal-entities/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /payroll-statutory-units/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /establishments/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/OrganisationApproval'
  /legal-entities/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /payroll-statutory-units/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /establishments/{identityId}/audit:
    $ref: '#/components/pathItems/OrganisationAudit'
  /organisation-hierarchy:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    - $ref: '#/components/parameters/AsOf'
    get:
      tags: [Organisation]
      summary: Read the effective organisation hierarchy
      operationId: getOrganisationHierarchy
      x-permission: organisation.read
      responses:
        '200':
          description: Legal entity, payroll statutory unit and establishment hierarchy
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationHierarchy'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
  /payroll-calendars:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags: [Calendar]
      summary: Create monthly payroll calendar
      operationId: createPayrollCalendar
      x-permission: calendar.create
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayrollCalendarCreate'
      responses:
        '201':
          description: Calendar created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollCalendar'
        '400': {$ref: '#/components/responses/Problem'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Problem'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
    get:
      tags: [Calendar]
      summary: List payroll calendars
      operationId: listPayrollCalendars
      x-permission: calendar.read
      responses:
        '200':
          description: Tenant payroll calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayrollCalendar'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /payroll-calendars/{calendarId}/periods:
    parameters:
    - $ref: '#/components/parameters/CalendarId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags: [Calendar]
      summary: Generate deterministic monthly periods
      operationId: generatePayPeriods
      x-permission: calendar.period.generate
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePeriodsRequest'
      responses:
        '201':
          description: Twelve generated or replayed monthly periods
          content:
            application/json:
              schema:
                type: array
                minItems: 12
                maxItems: 12
                items:
                  $ref: '#/components/schemas/PayPeriod'
        '400': {$ref: '#/components/responses/Problem'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Problem'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
    get:
      tags: [Calendar]
      summary: List payroll periods
      operationId: listPayPeriods
      x-permission: calendar.read
      parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
          minimum: 2020
          maximum: 2100
      responses:
        '200':
          description: Calendar periods ordered by start date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PayPeriod'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/Problem'}
        '422': {$ref: '#/components/responses/UnprocessableEntity'}
  /payroll-calendars/{calendarId}/audit:
    parameters:
    - $ref: '#/components/parameters/CalendarId'
    - $ref: '#/components/parameters/CorrelationId'
    get:
      tags: [Calendar]
      summary: Read payroll-calendar audit history
      operationId: getPayrollCalendarAudit
      x-permission: audit.read
      responses:
        '200':
          description: Calendar audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /pay-groups:
    $ref: '#/components/pathItems/PayGroupCollection'
  /pay-groups/{identityId}:
    $ref: '#/components/pathItems/PayGroupIdentity'
  /pay-groups/{identityId}/versions:
    $ref: '#/components/pathItems/PayGroupVersions'
  /pay-groups/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/PayGroupCorrection'
  /pay-groups/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/PayGroupEndDate'
  /pay-groups/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/PayGroupApproval'
  /pay-groups/{identityId}/audit:
    $ref: '#/components/pathItems/PayGroupAudit'
  /pay-components:
    $ref: '#/components/pathItems/PayComponentCollection'
  /pay-components/{identityId}:
    $ref: '#/components/pathItems/PayComponentIdentity'
  /pay-components/{identityId}/versions:
    $ref: '#/components/pathItems/PayComponentVersions'
  /pay-components/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/PayComponentCorrection'
  /pay-components/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/PayComponentEndDate'
  /pay-components/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/PayComponentApproval'
  /pay-components/{identityId}/audit:
    $ref: '#/components/pathItems/PayComponentAudit'
  /salary-structures:
    $ref: '#/components/pathItems/SalaryStructureCollection'
  /salary-structures/{identityId}:
    $ref: '#/components/pathItems/SalaryStructureIdentity'
  /salary-structures/{identityId}/versions:
    $ref: '#/components/pathItems/SalaryStructureVersions'
  /salary-structures/{identityId}/versions/{versionId}/corrections:
    $ref: '#/components/pathItems/SalaryStructureCorrection'
  /salary-structures/{identityId}/versions/{versionId}/end-date:
    $ref: '#/components/pathItems/SalaryStructureEndDate'
  /salary-structures/{identityId}/versions/{versionId}/approval:
    $ref: '#/components/pathItems/SalaryStructureApproval'
  /salary-structures/{identityId}/audit:
    $ref: '#/components/pathItems/SalaryStructureAudit'
  /payroll-relationships:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipCollection'
  /payroll-relationships/{identityId}:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipIdentity'
  /payroll-relationships/{identityId}/versions:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipVersions'
  /payroll-relationships/{identityId}/versions/{versionId}/corrections:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipCorrection'
  /payroll-relationships/{identityId}/versions/{versionId}/end-date:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipEndDate'
  /payroll-relationships/{identityId}/versions/{versionId}/approval:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipApproval'
  /payroll-relationships/{identityId}/audit:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollRelationshipAudit'
  /payroll-assignments:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentCollection'
  /payroll-assignments/{identityId}:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentIdentity'
  /payroll-assignments/{identityId}/versions:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentVersions'
  /payroll-assignments/{identityId}/versions/{versionId}/corrections:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentCorrection'
  /payroll-assignments/{identityId}/versions/{versionId}/end-date:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentEndDate'
  /payroll-assignments/{identityId}/versions/{versionId}/approval:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentApproval'
  /payroll-assignments/{identityId}/audit:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayrollAssignmentAudit'
  /employee-payroll-profiles:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/EmployeePayrollProfileCollection'
  /employee-payroll-profiles/{profileId}:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/EmployeePayrollProfileIdentity'
  /payroll-relationships/{relationshipId}/profile:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/EmployeePayrollProfileByRelationship'
  /employee-payroll-profiles/{profileId}/status:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/EmployeePayrollProfileStatus'
  /employee-payroll-profiles/{profileId}/audit:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/EmployeePayrollProfileAudit'
  /pay-group-assignments:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayGroupAssignmentCollection'
  /pay-group-assignments/{assignmentId}/corrections:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayGroupAssignmentCorrection'
  /pay-group-assignments/{assignmentId}/approval:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayGroupAssignmentApproval'
  /pay-group-assignments/{assignmentId}/end-date:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayGroupAssignmentEndDate'
  /pay-group-assignments/{assignmentId}/audit:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/PayGroupAssignmentAudit'
  /salary-assignments:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/SalaryAssignmentCollection'
  /salary-assignments/{assignmentId}/corrections:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/SalaryAssignmentCorrection'
  /salary-assignments/{assignmentId}/approval:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/SalaryAssignmentApproval'
  /salary-assignments/{assignmentId}/end-date:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/SalaryAssignmentEndDate'
  /salary-assignments/{assignmentId}/audit:
    $ref: './employee-payroll-openapi-v1.yaml#/pathItems/SalaryAssignmentAudit'
  /payroll-cycles:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCycleCollection'
  /payroll-cycles/{cycleId}:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCycleIdentity'
  /payroll-cycles/{cycleId}/population-resolution:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCyclePopulationResolution'
  /payroll-cycles/{cycleId}/population:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCyclePopulation'
  /payroll-cycles/{cycleId}/population-resolutions:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCyclePopulationResolutions'
  /payroll-cycles/{cycleId}/population-decisions:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCyclePopulationDecisions'
  /payroll-cycles/{cycleId}/audit:
    $ref: './payroll-operations-openapi-v1.yaml#/pathItems/PayrollCycleAudit'
  /payroll-cycles/{cycleId}/seal-inputs:
    parameters:
    - $ref: '#/components/parameters/CycleId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Payroll Operations
      operationId: sealInputs
      x-permission: payroll-cycle.inputs.seal
      responses:
        '200':
          description: Sealed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotSummary'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Seal Inputs
  /payroll-calculations:
    parameters:
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Calculation
      operationId: calculatePayroll
      x-permission: payroll-calculation.execute
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculationRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationAccepted'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      summary: Calculate Payroll
  /payroll-results/{resultId}:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    get:
      tags:
      - Calculation
      operationId: getPayrollResult
      x-permission: payroll-result.read
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollResult'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Payroll Result
  /payroll-results/{resultId}/trace:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    get:
      tags:
      - Calculation
      operationId: getCalculationTrace
      x-permission: payroll-result.trace.read
      responses:
        '200':
          description: Trace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TraceStep'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Calculation Trace
  /payroll-results/{resultId}/draft-payslip:
    parameters:
    - $ref: '#/components/parameters/ResultId'
    - $ref: '#/components/parameters/CorrelationId'
    post:
      tags:
      - Documents
      operationId: generateDraftPayslip
      x-permission: draft-payslip.generate
      responses:
        '201':
          description: Generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPayslip'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Generate Draft Payslip
    get:
      tags:
      - Documents
      operationId: getDraftPayslip
      x-permission: draft-payslip.read
      responses:
        '200':
          description: Draft payslip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPayslip'
        '400':
          $ref: '#/components/responses/Problem'
      summary: Get Draft Payslip
components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: http://localhost:8081/realms/payroll/.well-known/openid-configuration
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      description: Caller-supplied UUID used for request, log, event and error correlation. A value is generated when omitted or invalid.
      schema:
        type: string
        format: uuid
    CalendarId:
      name: calendarId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CycleId:
      name: cycleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResultId:
      name: resultId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 120
    IdentityId:
      name: identityId
      in: path
      required: true
      schema: {type: string, format: uuid}
    VersionId:
      name: versionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    AsOf:
      name: asOf
      in: query
      required: false
      description: Effective date; defaults to the application clock date.
      schema: {type: string, format: date}
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Numeric version ETag used for optimistic concurrency.
      schema: {type: string, pattern: '^(W/)?"?[0-9]+"?$'}
  pathItems:
    OrganisationCollection:
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: listOrganisationIdentities
        tags: [Organisation]
        summary: List effective organisation identities
        x-permission: organisation.read
        parameters:
        - $ref: '#/components/parameters/AsOf'
        responses:
          '200':
            description: Effective organisation identities
            headers:
              X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
            content:
              application/json:
                schema: {type: array, items: {$ref: '#/components/schemas/OrganisationVersion'}}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
      post:
        operationId: createOrganisationIdentity
        tags: [Organisation]
        summary: Create a stable identity and first draft version
        x-permission: organisation.create
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '201': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
    OrganisationIdentity:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: getOrganisationIdentity
        tags: [Organisation]
        summary: Get the current or as-of approved version
        x-permission: organisation.read
        parameters:
        - $ref: '#/components/parameters/AsOf'
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '429': {$ref: '#/components/responses/TooManyRequests'}
          '500': {$ref: '#/components/responses/InternalServerError'}
          '503': {$ref: '#/components/responses/ServiceUnavailable'}
    OrganisationVersions:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/CorrelationId'
      get:
        operationId: listOrganisationVersions
        tags: [Organisation]
        summary: Read complete version history
        x-permission: organisation.read
        responses:
          '200':
            description: Ordered version history, including superseded drafts
            headers:
              X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
            content:
              application/json:
                schema: {type: array, items: {$ref: '#/components/schemas/OrganisationVersion'}}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
      post:
        operationId: createOrganisationVersion
        tags: [Organisation]
        summary: Append a future effective-dated version
        x-permission: organisation.version.create
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '201': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
    OrganisationCorrection:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/CorrelationId'
      post:
        operationId: correctOrganisationVersion
        tags: [Organisation]
        summary: Supersede an eligible future draft without rewriting it
        x-permission: organisation.version.correct
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        requestBody: {$ref: '#/components/requestBodies/OrganisationWriteRequest'}
        responses:
          '200': {$ref: '#/components/responses/OrganisationVersion'}
          '401': {$ref: '#/components/responses/Unauthorized'}
          '403': {$ref: '#/components/responses/Forbidden'}
          '404': {$ref: '#/components/responses/NotFound'}
          '409': {$ref: '#/components/responses/Conflict'}
          '422': {$ref: '#/components/responses/UnprocessableEntity'}
    OrganisationEndDate:
      parameters:
      - $ref: '#/components/parameters/IdentityId'
      - $ref: '#/components/parameters/VersionId'
      - $ref: '#/components/parameters/CorrelationId'
      post:
        operationId: endDateOrganisationVersion
        tags: [Organisation]
        summary: End-date an active version through the controlled lifecycle command
        x-permission: organisation.version.end-date
        parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
        requestBody:
          required: true
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OrganisationEndDate'}
        responses:
