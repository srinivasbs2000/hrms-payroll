          schema: {$ref: '#/components/schemas/OrganisationVersion'}
    PayGroupVersion:
      description: Pay-group identity and exact effective-dated version
      headers:
        X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
        ETag:
          description: Numeric optimistic-concurrency version
          schema: {type: string}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/PayGroupVersion'}
    PayComponentVersion:
      description: Pay-component identity and exact effective-dated version
      headers:
        X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
        ETag:
          description: Numeric optimistic-concurrency version
          schema: {type: string}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/PayComponentVersion'}
    SalaryStructureVersion:
      description: Salary-structure identity, exact version and immutable component lines
      headers:
        X-Correlation-ID: {$ref: '#/components/headers/CorrelationId'}
        ETag:
          description: Numeric optimistic-concurrency version
          schema: {type: string}
      content:
        application/json:
          schema: {$ref: '#/components/schemas/SalaryStructureVersion'}
    Problem:
      description: Problem Details
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  headers:
    CorrelationId:
      description: UUID shared by request logs, domain events and RFC 9457 error responses.
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    OrganisationWrite:
      type: object
      additionalProperties: false
      required: [name, effectiveFrom]
      properties:
        code:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
          description: Required only when creating a stable identity.
        name: {type: string, minLength: 1, maxLength: 200}
        countryCode: {type: [string, 'null'], pattern: '^[A-Z]{2}$'}
        currency: {type: [string, 'null'], pattern: '^[A-Z]{3}$'}
        stateCode: {type: [string, 'null'], pattern: '^[A-Z0-9]{2,3}$'}
        parentVersionId:
          type: [string, 'null']
          format: uuid
          description: Exact legal-entity version for a PSU or exact PSU version for an establishment.
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
    OrganisationEndDate:
      type: object
      additionalProperties: false
      required: [effectiveTo]
      properties:
        effectiveTo: {type: string, format: date}
    OrganisationVersion:
      type: object
      additionalProperties: false
      required: [kind, identityId, code, identityStatus, versionId, versionSequence, versionNo,
        name, effectiveFrom, approvalStatus, superseded]
      properties:
        kind: {type: string, enum: [LEGAL_ENTITY, PAYROLL_STATUTORY_UNIT, ESTABLISHMENT]}
        identityId: {type: string, format: uuid}
        code: {type: string}
        identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
        versionId: {type: string, format: uuid}
        versionSequence: {type: integer, minimum: 1}
        versionNo: {type: integer, format: int64, minimum: 0}
        name: {type: string}
        countryCode: {type: [string, 'null']}
        currency: {type: [string, 'null']}
        stateCode: {type: [string, 'null']}
        parentVersionId: {type: [string, 'null'], format: uuid}
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
        supersedesVersionId: {type: [string, 'null'], format: uuid}
        superseded: {type: boolean}
    OrganisationHierarchy:
      type: object
      required: [asOf, legalEntities]
      properties:
        asOf: {type: string, format: date}
        legalEntities:
          type: array
          items: {$ref: '#/components/schemas/OrganisationHierarchyNode'}
    OrganisationHierarchyNode:
      type: object
      required: [value, children]
      properties:
        value: {$ref: '#/components/schemas/OrganisationVersion'}
        children:
          type: array
          items: {$ref: '#/components/schemas/OrganisationHierarchyNode'}
    AuditEvent:
      type: object
      required: [id, occurredAt, actor, action, objectType, objectId, correlationId, metadata]
      properties:
        id: {type: string, format: uuid}
        occurredAt: {type: string, format: date-time}
        actor: {type: string}
        action: {type: string}
        objectType: {type: string}
        objectId: {type: string, format: uuid}
        correlationId: {type: string, format: uuid}
        beforeState: {type: [string, 'null']}
        afterState: {type: [string, 'null']}
        metadata: {type: string}
    Money:
      type: object
      required:
      - amount
      - currency
      properties:
        amount:
          type: string
          pattern: ^-?[0-9]+(\.[0-9]{1,4})?$
        currency:
          type: string
          pattern: ^[A-Z]{3}$
    PayrollCalendarCreate:
      type: object
      additionalProperties: false
      required: [code, name]
      properties:
        code:
          type: string
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
        name:
          type: string
          minLength: 1
          maxLength: 160
        frequency:
          type: [string, 'null']
          const: MONTHLY
          default: MONTHLY
        timezone:
          type: [string, 'null']
          default: Asia/Kolkata
    PayrollCalendar:
      type: object
      additionalProperties: false
      required: [id, code, name, frequency, timezone]
      properties:
        id: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        frequency: {type: string, const: MONTHLY}
        timezone: {type: string}
    GeneratePeriodsRequest:
      type: object
      additionalProperties: false
      required: [year]
      properties:
        year:
          type: integer
          minimum: 2020
          maximum: 2100
        paymentDay:
          type: [integer, 'null']
          minimum: 1
          maximum: 31
          default: 31
    PayPeriod:
      type: object
      additionalProperties: false
      required:
      - id
      - calendarId
      - periodCode
      - periodStart
      - periodEnd
      - paymentDate
      - status
      properties:
        id: {type: string, format: uuid}
        calendarId: {type: string, format: uuid}
        periodCode:
          type: string
          pattern: '^[0-9]{4}-[0-9]{2}$'
        periodStart: {type: string, format: date}
        periodEnd: {type: string, format: date}
        paymentDate: {type: string, format: date}
        status: {type: string, enum: [OPEN, CLOSED]}
    PayGroupWrite:
      type: object
      additionalProperties: false
      required: [name, payrollStatutoryUnitVersionId, calendarId, effectiveFrom]
      properties:
        code:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
          description: Required only when creating a stable pay-group identity.
        name: {type: string, minLength: 1, maxLength: 160}
        payrollStatutoryUnitVersionId:
          type: string
          format: uuid
          description: Exact approved payroll statutory unit version used for lineage.
        calendarId:
          type: string
          format: uuid
          description: Same-tenant monthly payroll calendar.
        currency:
          type: [string, 'null']
          const: INR
          default: INR
        prorationMethod:
          type: [string, 'null']
          const: CALENDAR_DAYS
          default: CALENDAR_DAYS
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
    PayGroupEndDate:
      type: object
      additionalProperties: false
      required: [effectiveTo]
      properties:
        effectiveTo: {type: string, format: date}
    PayGroupVersion:
      type: object
      additionalProperties: false
      required:
      - identityId
      - code
      - identityStatus
      - versionId
      - versionSequence
      - versionNo
      - name
      - payrollStatutoryUnitVersionId
      - calendarId
      - currency
      - prorationMethod
      - effectiveFrom
      - approvalStatus
      - superseded
      properties:
        identityId: {type: string, format: uuid}
        code: {type: string}
        identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
        versionId: {type: string, format: uuid}
        versionSequence: {type: integer, minimum: 1}
        versionNo: {type: integer, format: int64, minimum: 0}
        name: {type: string}
        payrollStatutoryUnitVersionId: {type: string, format: uuid}
        calendarId: {type: string, format: uuid}
        currency: {type: string, const: INR}
        prorationMethod: {type: string, const: CALENDAR_DAYS}
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
        supersedesVersionId: {type: [string, 'null'], format: uuid}
        superseded: {type: boolean}
    PayComponentWrite:
      type: object
      additionalProperties: false
      required: [formulaType, effectiveFrom]
      properties:
        code:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
          description: Required only when creating a stable pay-component identity.
        name:
          type: [string, 'null']
          minLength: 1
          maxLength: 160
          description: Required only when creating a stable pay-component identity.
        componentType:
          type: [string, 'null']
          enum: [EARNING, DEDUCTION, INFORMATION, null]
          description: Required only when creating a stable pay-component identity.
        formulaType:
          type: string
          enum: [FIXED, PERCENTAGE_OF_COMPONENT, RESIDUAL]
        formulaExpression:
          type: [string, 'null']
          maxLength: 1000
        fixedAmount:
          type: [number, 'null']
          minimum: 0
          multipleOf: 0.0001
        roundingScale:
          type: [integer, 'null']
          minimum: 0
          maximum: 4
          default: 2
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
    PayComponentEndDate:
      type: object
      additionalProperties: false
      required: [effectiveTo]
      properties:
        effectiveTo: {type: string, format: date}
    PayComponentVersion:
      type: object
      additionalProperties: false
      required:
      - identityId
      - code
      - name
      - componentType
      - versionId
      - versionSequence
      - versionNo
      - formulaType
      - roundingScale
      - effectiveFrom
      - approvalStatus
      - superseded
      properties:
        identityId: {type: string, format: uuid}
        code: {type: string}
        name: {type: string}
        componentType:
          type: string
          enum: [EARNING, DEDUCTION, INFORMATION]
        versionId: {type: string, format: uuid}
        versionSequence: {type: integer, minimum: 1}
        versionNo: {type: integer, format: int64, minimum: 0}
        formulaType:
          type: string
          enum: [FIXED, PERCENTAGE_OF_COMPONENT, RESIDUAL]
        formulaExpression: {type: [string, 'null']}
        fixedAmount:
          type: [number, 'null']
          minimum: 0
          multipleOf: 0.0001
        roundingScale:
          type: integer
          minimum: 0
          maximum: 4
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
        supersedesVersionId: {type: [string, 'null'], format: uuid}
        superseded: {type: boolean}
    SalaryStructureWrite:
      type: object
      additionalProperties: false
      required: [name, effectiveFrom, lines]
      properties:
        code:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
          description: Required only when creating a stable salary-structure identity.
        name:
          type: string
          minLength: 1
          maxLength: 160
        currency:
          type: [string, 'null']
          const: INR
          default: INR
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        lines:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/SalaryStructureLineWrite'}
    SalaryStructureLineWrite:
      type: object
      additionalProperties: false
      required: [componentVersionId, sequenceNo]
      properties:
        componentVersionId:
          type: string
          format: uuid
          description: Exact approved pay-component version used for calculation lineage.
        sequenceNo:
          type: integer
          minimum: 1
        targetAmount:
          type: [number, 'null']
          minimum: 0
          multipleOf: 0.0001
        targetPercentage:
          type: [number, 'null']
          exclusiveMinimum: 0
          maximum: 100
          multipleOf: 0.000001
        percentageBaseCode:
          type: [string, 'null']
          pattern: ^[A-Z][A-Z0-9_]{1,39}$
    SalaryStructureEndDate:
      type: object
      additionalProperties: false
      required: [effectiveTo]
      properties:
        effectiveTo: {type: string, format: date}
    SalaryStructureLineView:
      type: object
      additionalProperties: false
      required:
      - id
      - componentVersionId
      - componentCode
      - componentName
      - componentType
      - componentFormulaType
      - sequenceNo
      - effectiveFrom
      properties:
        id: {type: string, format: uuid}
        componentVersionId: {type: string, format: uuid}
        componentCode: {type: string}
        componentName: {type: string}
        componentType:
          type: string
          enum: [EARNING, DEDUCTION, INFORMATION]
        componentFormulaType:
          type: string
          enum: [FIXED, PERCENTAGE_OF_COMPONENT, RESIDUAL]
        sequenceNo: {type: integer, minimum: 1}
        targetAmount:
          type: [number, 'null']
          minimum: 0
          multipleOf: 0.0001
        targetPercentage:
          type: [number, 'null']
          exclusiveMinimum: 0
          maximum: 100
          multipleOf: 0.000001
        percentageBaseCode:
          type: [string, 'null']
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
    SalaryStructureVersion:
      type: object
      additionalProperties: false
      required:
      - identityId
      - code
      - identityStatus
      - versionId
      - versionSequence
      - versionNo
      - name
      - currency
      - effectiveFrom
      - approvalStatus
      - superseded
      - lines
      properties:
        identityId: {type: string, format: uuid}
        code: {type: string}
        identityStatus: {type: string, enum: [ACTIVE, INACTIVE]}
        versionId: {type: string, format: uuid}
        versionSequence: {type: integer, minimum: 1}
        versionNo: {type: integer, format: int64, minimum: 0}
        name: {type: string}
        currency: {type: string, const: INR}
        effectiveFrom: {type: string, format: date}
        effectiveTo: {type: [string, 'null'], format: date}
        approvalStatus: {type: string, enum: [DRAFT, APPROVED, REJECTED]}
        supersedesVersionId: {type: [string, 'null'], format: uuid}
        superseded: {type: boolean}
        lines:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/SalaryStructureLineView'}
    SnapshotSummary:
      type: object
      required:
      - cycleId
      - snapshotCount
      - combinedHash
      properties:
        cycleId:
          type: string
          format: uuid
        snapshotCount:
          type: integer
        combinedHash:
          type: string
    CalculationRequest:
      type: object
      required:
      - payrollCycleId
      properties:
        payrollCycleId:
          type: string
          format: uuid
        mode:
          type: string
          enum:
          - TRIAL
          default: TRIAL
    CalculationAccepted:
      type: object
      required:
      - calculationRequestId
      - status
      properties:
        calculationRequestId:
          type: string
          format: uuid
        status:
          type: string
          const: ACCEPTED
    ComponentResult:
      type: object
      required:
      - componentCode
      - unproratedAmount
      - prorationFactor
      - calculatedAmount
      properties:
        componentCode:
          type: string
        unproratedAmount:
          $ref: '#/components/schemas/Money'
        prorationFactor:
          type: string
        calculatedAmount:
          $ref: '#/components/schemas/Money'
    PayrollResult:
      type: object
      required:
      - id
      - payrollCycleId
      - payrollAssignmentId
      - gross
      - deductions
      - net
      - components
      - resultHash
      properties:
        id:
          type: string
          format: uuid
        payrollCycleId:
          type: string
          format: uuid
        payrollAssignmentId:
          type: string
          format: uuid
        gross:
          $ref: '#/components/schemas/Money'
        deductions:
          $ref: '#/components/schemas/Money'
        net:
          $ref: '#/components/schemas/Money'
        components:
          type: array
          items:
            $ref: '#/components/schemas/ComponentResult'
        resultHash:
          type: string
    TraceStep:
      type: object
      required:
      - stepNo
      - stepType
      - inputs
      - output
      properties:
        stepNo:
          type: integer
        componentCode:
          type:
          - string
          - 'null'
        stepType:
          type: string
        inputs:
          type: object
          additionalProperties: true
        expression:
          type:
          - string
          - 'null'
        output:
          type: string
        message:
          type:
          - string
          - 'null'
    DraftPayslip:
      type: object
      required:
      - id
      - payrollResultId
      - status
      - employeeNumber
      - payPeriod
      - earnings
      - gross
      - net
      properties:
        id:
          type: string
          format: uuid
        payrollResultId:
          type: string
          format: uuid
        status:
          type: string
          const: DRAFT
        employeeNumber:
          type: string
        payPeriod:
          type: string
        earnings:
          type: array
          items:
            $ref: '#/components/schemas/ComponentResult'
        gross:
          $ref: '#/components/schemas/Money'
        net:
          $ref: '#/components/schemas/Money'
        disclaimer:
          type: string
    Problem:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - instance
      - correlationId
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        correlationId:
          type: string
          format: uuid
        code:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
