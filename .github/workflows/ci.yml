name: payroll-baseline

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw --batch-mode verify

  react-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/payroll-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/payroll-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  openapi-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
      - run: npx --yes --package=@redocly/cli@2.39.0 redocly lint contracts/openapi/payroll-vertical-slice-openapi-v1.yaml

  flyway-fresh-validation-rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw --batch-mode -pl backend/database-migrations -am verify

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
      - run: ./mvnw --batch-mode org.owasp:dependency-check-maven:12.1.8:check -DfailBuildOnCVSS=7
      - run: npm ci
        working-directory: frontend/payroll-web
      - run: npm audit --audit-level=high
        working-directory: frontend/payroll-web

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
      - run: ./mvnw --batch-mode org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom
      - run: npm ci
        working-directory: frontend/payroll-web
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-file bom-frontend.json
        working-directory: frontend/payroll-web
      - uses: actions/upload-artifact@v4
        with:
          name: payroll-sboms
          path: |
            target/bom.json
            frontend/payroll-web/bom-frontend.json
