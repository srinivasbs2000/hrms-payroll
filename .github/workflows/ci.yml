name: payroll-baseline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven verify
        run: ./mvnw --batch-mode verify
      - name: Upload Maven test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: maven-test-reports-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  react-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend/payroll-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/payroll-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high
      - name: Upload React build diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: react-build-${{ github.run_attempt }}
          if-no-files-found: warn
          path: frontend/payroll-web/dist/

  openapi-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/payroll-web/package-lock.json
      - name: Validate OpenAPI
        run: npx --yes --package=@redocly/cli@2.39.0 redocly lint contracts/openapi/payroll-vertical-slice-openapi-v1.yaml 2>&1 | tee openapi-validation.log
      - name: Upload OpenAPI diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: openapi-validation-${{ github.run_attempt }}
          path: openapi-validation.log

  flyway-fresh-validation-rls:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Fresh Flyway installation, validation and RLS tests
        run: ./mvnw --batch-mode -pl backend/database-migrations -am verify
      - name: Upload migration and RLS test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flyway-rls-reports-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            backend/database-migrations/target/surefire-reports/**
            backend/database-migrations/target/failsafe-reports/**

  auth-smoke-synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Prepare synthetic development credentials
        run: cp deploy/local/.env.example deploy/local/.env
      - name: Start PostgreSQL and Keycloak
        run: docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml up -d
      - name: Wait for PostgreSQL
        run: |
          for _ in {1..60}; do
            if docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml exec -T postgres pg_isready -U postgres -d payroll; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml logs postgres
          exit 1
      - name: Wait for Keycloak
        run: |
          for _ in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8081/realms/payroll/.well-known/openid-configuration > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml logs keycloak
          exit 1
      - name: Apply and validate Flyway migrations
        shell: bash
        run: |
          set -a
          source deploy/local/.env
          set +a
          FLYWAY_URL=jdbc:postgresql://127.0.0.1:${POSTGRES_PORT}/payroll \
          FLYWAY_USER=payroll_migrator \
          FLYWAY_PASSWORD="${PAYROLL_MIGRATOR_PASSWORD}" \
            ./mvnw --batch-mode -pl backend/database-migrations flyway:migrate flyway:validate
      - name: Install backend modules
        run: ./mvnw --batch-mode -DskipTests install
      - name: Start secured application
        shell: bash
        run: |
          set -a
          source deploy/local/.env
          set +a
          mkdir -p target
          BASELINE_AUTH_SMOKE_ENABLED=true \
          DB_URL=jdbc:postgresql://127.0.0.1:${POSTGRES_PORT}/payroll \
          DB_USER=payroll_app \
          DB_PASSWORD="${PAYROLL_APP_PASSWORD}" \
          OIDC_ISSUER=http://127.0.0.1:8081/realms/payroll \
          OIDC_JWK_SET_URI=http://127.0.0.1:8081/realms/payroll/protocol/openid-connect/certs \
          OIDC_AUDIENCE=payroll-api \
            nohup ./mvnw --batch-mode -f backend/payroll-boot/pom.xml spring-boot:run > target/auth-smoke-app.log 2>&1 &
          echo $! > target/auth-smoke-app.pid
      - name: Wait for secured application
        run: |
          for _ in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat target/auth-smoke-app.log
          exit 1
      - name: Obtain real token and call secured endpoint
        shell: pwsh
        run: ./deploy/local/smoke/auth-smoke.ps1
      - name: Collect authentication smoke diagnostics
        if: always()
        run: |
          mkdir -p target
          docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml logs --no-color > target/auth-smoke-compose.log 2>&1 || true
      - name: Upload authentication smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: auth-smoke-diagnostics-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            target/auth-smoke-app.log
            target/auth-smoke-compose.log
      - name: Stop authentication smoke services
        if: always()
        run: docker compose --env-file deploy/local/.env -f deploy/local/compose.yaml down -v

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPENDENCY_CHECK_VERSION: '12.2.2'
      DEPENDENCY_CHECK_DATA: .dependency-check-data
      NVD_API_KEY: ${{ secrets.NVD_API_KEY || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Select Dependency-Check cache date
        id: dependency-check-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore Dependency-Check vulnerability data
        id: dependency-check-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DEPENDENCY_CHECK_DATA }}
          key: dependency-check-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ steps.dependency-check-date.outputs.date }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_VERSION }}-

      - name: Validate restored Dependency-Check data
        id: dependency-check-data
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DEPENDENCY_CHECK_DATA"

          valid_db="$(
            find "$DEPENDENCY_CHECK_DATA" \
              -type f \
              -name 'odc.mv.db' \
              -size +10M \
              -print \
              -quit 2>/dev/null || true
          )"

          if [[ -n "$valid_db" ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Valid Dependency-Check database restored: $valid_db"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "No valid Dependency-Check database was restored."
            find "$DEPENDENCY_CHECK_DATA" \
              -mindepth 1 \
              -maxdepth 1 \
              -exec rm -rf {} +
          fi

      - name: Prepare reactor artifacts for dependency analysis
        run: ./mvnw --batch-mode -Dmaven.test.skip=true install

      - name: OWASP Dependency-Check
        id: owasp
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p target

          nvd_args=()
          if [[ -n "${NVD_API_KEY}" ]]; then
            nvd_args+=("-DnvdApiKeyEnvironmentVariable=NVD_API_KEY")
          fi

          common_args=(
            --batch-mode
            "org.owasp:dependency-check-maven:${DEPENDENCY_CHECK_VERSION}:check"
            "-DdataDirectory=${DEPENDENCY_CHECK_DATA}"
            "-DfailBuildOnCVSS=7"
            "-Dformats=JSON,HTML"
          )

          echo "Running one online Dependency-Check analysis..."
          if ./mvnw "${common_args[@]}" "${nvd_args[@]}" \
              2>&1 | tee target/dependency-check-online.log; then
            echo "mode=online" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.dependency-check-data.outputs.valid }}" == "true" ]]; then
            echo "::warning::Online NVD update failed; retrying once with the previously validated cached database."
            if ./mvnw "${common_args[@]}" -DautoUpdate=false \
                2>&1 | tee target/dependency-check-offline.log; then
              echo "mode=offline-cache" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Dependency-Check failed with both online and validated cached data."
              exit 1
            fi
          else
            echo "::error::Dependency-Check could not update NVD data and no valid cached database is available."
            exit 1
          fi

          report="$(
            find . \
              -path '*/target/dependency-check-report.json' \
              -type f \
              -size +0c \
              -print \
              -quit
          )"

          if [[ -z "$report" ]]; then
            echo "::error::Dependency-Check completed without producing a JSON report."
            exit 1
          fi

          echo "report_generated=true" >> "$GITHUB_OUTPUT"
          echo "Dependency-Check report: $report"

      - name: Save validated Dependency-Check vulnerability data
        if: steps.owasp.outputs.report_generated == 'true' && steps.dependency-check-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.DEPENDENCY_CHECK_DATA }}
          key: dependency-check-${{ runner.os }}-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ steps.dependency-check-date.outputs.date }}

      - name: Upload dependency scan reports and diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-scan-reports-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            **/target/dependency-check-report.*
            target/dependency-check-*.log
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: frontend/payroll-web/package-lock.json
      - run: ./mvnw --batch-mode org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom
      - run: npm ci
        working-directory: frontend/payroll-web
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-file bom-frontend.json
        working-directory: frontend/payroll-web
      - name: Upload SBOMs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: payroll-sboms-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            target/bom.json
            target/bom.xml
            frontend/payroll-web/bom-frontend.json
